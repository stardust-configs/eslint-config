name: CI

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.4.0
      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version-file: '.node-version'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn
      - name: Build
        run: yarn build

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.4.0
      - name: Use Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version-file: '.node-version'
          cache: 'yarn'
      - name: Install dependencies
        run: yarn
      - name: Format check
        run: yarn format:check
